name: Build and Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NEXUS_URL: https://rob-repo.ngrok.io
  IQ_URL: https://rob-iq-server.ngrok.io
  IQ_APP_ID: sonatype-demo-huggingface-GH

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configure pip for Nexus
      run: |
        mkdir -p ~/.config/pip
        cat > ~/.config/pip/pip.conf << EOF
        [global]
        index-url = https://${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_TOKEN }}@rob-repo.ngrok.io/repository/demo-pypi-proxy/simple/
        trusted-host = rob-repo.ngrok.io
        EOF

    - name: Install dependencies and download binaries
      run: |
        python -m venv venv
        . venv/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt
        pip download -r requirements.txt -d ./py-deps

    - name: Setup Sonatype IQ CLI
      uses: sonatype/actions/setup-iq-cli@v1
      with:
        iq-cli-version: 2.12.1-01

    - name: Run Sonatype Lifecycle Scan
      uses: sonatype/actions/run-iq-cli@v1
      with:
        iq-server-url: ${{ env.IQ_URL }}
        username: ${{ secrets.IQ_USER }}
        password: ${{ secrets.IQ_TOKEN }}
        application-id: ${{ env.IQ_APP_ID }}
        stage: build
        scan-targets: py-deps
